[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "nd-wordlist-tools"
version = "0.1.0"
description = "Wordlist utilities focused on multi-word passphrases."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Nick DeMarco" }]
dependencies = []

[project.optional-dependencies]
cli = ["typer>=0.12.3", "rich>=13.7.1"]
speed = ["orjson>=3.10.0"]  # if you later need JSON speed
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "mypy>=1.11",
  "ruff>=0.5.6",
  "pre-commit>=3.8",
  "build>=1.2",
]

[project.scripts]
nd-wordlist = "nd_wordlist_tools.cli:app"

[tool.ruff]
line-length = 100
target-version = "py310"
fix = true

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W", "PERF", "C90"]
ignore = [
  "E203",  # allow slice spacing like Black
  "E266",  # too many leading '#' allowed for section headers
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # allow assert in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[tool.pytest.ini_options]
addopts = "-q --cov=nd_wordlist_tools --cov-report=term-missing"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_configs = true
warn_return_any = true
disallow_any_generics = true
disallow_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
mypy_path = "src"

[tool.hatch.build.targets.wheel]
packages = ["src/nd_wordlist_tools"]
